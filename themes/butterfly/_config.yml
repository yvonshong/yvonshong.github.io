# ==============================================================================
# 核心导航与社交 (Menu & Social)
# ==============================================================================
menu:
  主页: / || fas fa-home
  技术: /categories/tech/ || fas fa-microchip
  随笔: /categories/essay/ || fas fa-pen-nib
  标签: /tags/ || fas fa-tags
  # 关于: /about/ || fas fa-user  # 对应 Yilia 的 aboutme
# the subtitle on homepage (主頁subtitle)

subtitle:
  enable: true
  # Typewriter Effect (开启打字效果)
  effect: true
  # loop (循環打字)
  loop: true
  source: false
  sub:
    - 人生应当如盛夏🔆
    - 自动驾驶从业者🚚 | RoboTruck.jp
    - 早稻田修士🌸 | Waseda University
    - vlogger🎥 | B站id yvonshong 

# 社交图标 (对应 Yilia 的 subnav)
social:
  fab fa-bilibili: https://space.bilibili.com/6083595 || Bilibili || '#fb7299'
  fab fa-github: http://github.com/yvonshong || Github || '#dbd6d1'
  fas fa-envelope: mailto:yvon@shong.win || Email || '#f0ad4e'
  fas fa-rss: /atom.xml || RSS || '#f26522'

theme_color:
  enable: true
  main: '#39C5BB'

disable_top_img: false

index_img: https://cdn.jsdelivr.net/gh/yvonshong/picbed@master/v2-ebb9c94260c5a90f3c459cc2949c3b00_r.jpg

default_top_img: false
archive_img: false
tag_img: false
tag_per_img: false
category_img: false
category_per_img: false
# ==============================================================================
# 个人信息与侧边栏 (Author & Sidebar)
# ==============================================================================
# 对应 Yilia 的 avatar
avatar:
  img: https://cdn.jsdelivr.net/gh/yvonshong/picbed@master/HAbatdcnuM37PKf.png
  effect: false

# 对应 Yilia 的 aboutme
card_author:
  enable: true
  description: "自动驾驶从业者🚚 | RoboTruck.jp<br>早稻田修士🌸 | Waseda University<br>vlogger🎥 | B站id yvonshong <br>少年热忱🙋🏻‍♂️"
  button:
    enable: true
    icon: fab fa-zhihu
    text: 关注知乎
    link: http://zhihu.com/people/yvonshong

# 侧边栏配置
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: left
  card_author:
    enable: true
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order: desc
  card_categories:
    enable: true
  card_tags:
    enable: true
  card_archives:
    enable: false
  card_webinfo:
    enable: true

# ==============================================================================
# 评论系统 (Comments - Disqus)
# ==============================================================================
comments:
  use: Disqus  # 启用 Disqus
  text: true
  lazyload: false # Disqus 建议关闭懒加载以确保加载稳定
  count: false

disqus:
  shortname: shong # 你的 Disqus Shortname

# ==============================================================================
# 页面功能与样式 (Features & Style)
# ==============================================================================
# 网站图标
favicon: https://cdn.jsdelivr.net/gh/yvonshong/picbed@master/screenshot-20251210-230924.png

# 代码块
code:
  copy: true
  style: mac
  highlight: true

# 目录 (TOC)
toc:
  post: true
  page: true
  expand: true
  number: false

# 数学公式 (MathJax)
math:
  mathjax:
    enable: true
    per_page: false

# 字数统计
wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# 深色模式 (Dark Mode)
darkmode:
  enable: true  # 改为 true
  button: true  # 显示切换按钮
  autoChangeMode: 1 # (可选) 1: 根据系统设置自动切换; 2: 根据时间自动切换

# ==============================================================================
# 交互 (Interaction)
# ==============================================================================
# 打赏 (Reward)
reward:
  enable: true
  QR_code:
     - img: https://cdn.jsdelivr.net/gh/yvonshong/picbed@master/It31kXcofTA9UB2.png
       link:
       text: Wechat

# 分享 (Share)
share:
  enable: true
  type: sharejs
  sharejs:
    sites: facebook,twitter,wechat,weibo

search:
  # Choose: algolia_search / local_search / docsearch
  # leave it empty if you don't need search
  use: local_search
  placeholder: 'Search...'

  # Algolia Search
  algolia_search:
    # Number of search results per page
    hitsPerPage: 6

  # Local Search
  local_search:
    # Preload the search data when the page loads.
    enable: true
    preload: false
    # Show top n results per article, show all results by setting to -1
    top_n_per_article: 1
    # Unescape html strings to the readable one.
    unescape: false
    pagination:
      enable: true
      # Number of search results per page
      hitsPerPage: 8
    CDN:


# 图片懒加载
lazyload:
  enable: true
  field: site
  placeholder: https://cdn.jsdelivr.net/gh/yvonshong/picbed@master/screenshot-20251210-230924.png

# 底部信息
footer:
  owner:
    enable: true
    since: 2020
  copyright: true

pjax:
  enable: true
  exclude:
    # - /music/  # 如果有不需要刷新的页面可填在这里

# 找到 busuanzi
busuanzi:
  site_uv: true  # 统计本站访客数 (人数)
  site_pv: true  # 统计本站总访问量 (点击次)
  page_pv: true  # 统计单篇文章阅读量

